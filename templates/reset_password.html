{% extends "base.html" %}

{% block title %}Restablecer contraseña &mdash; EGP Referidos{% endblock %}

{% block content %}
<div style="max-width: 420px; margin: 4rem auto;" class="fade-in">
    <div class="card card-glass">
        <h2 class="text-center mb-1">Nueva Contraseña</h2>
        <p class="text-center text-muted mb-3" style="font-size: 0.9rem;">Crea una nueva contraseña segura.</p>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        {% if success %}
        <div class="alert alert-success">{{ success }}</div>
        <div class="text-center mt-3">
            <a href="/auth/login" class="btn btn-primary">Ir a iniciar sesión</a>
        </div>
        {% else %}
        <form method="POST" action="/auth/reset-password">
            <input type="hidden" name="token" value="{{ token }}">
            <div class="form-group">
                <label class="form-label" for="password">Nueva Contraseña</label>
                <input type="password" class="form-input" id="password" name="password"
                    placeholder="Al menos 6 caracteres" required minlength="6">
            </div>
            <div class="form-group">
                <label class="form-label" for="confirm_password">Confirmar Contraseña</label>
                <input type="password" class="form-input" id="confirm_password" name="confirm_password"
                    placeholder="Repite la contraseña" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary w-full btn-lg mt-2">Guardar Contraseña</button>
        </form>
        {% endif %}
    </div>
</div>
{% endblock %}
